<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 315" fill="none">
  <rect width="560" height="315" fill="#111111"/>

  <!-- Grid divider lines -->
  <line x1="280" y1="18" x2="280" y2="297" stroke="rgba(240,237,232,0.05)" stroke-width="1"/>
  <line x1="18" y1="157" x2="542" y2="157" stroke="rgba(240,237,232,0.05)" stroke-width="1"/>

  <!-- ─── TOP LEFT: Logo Construction ─── -->
  <!-- Section label -->
  <rect x="30" y="26" width="72" height="5" rx="2" fill="rgba(240,237,232,0.18)"/>
  <rect x="30" y="35" width="50" height="3" rx="1" fill="rgba(200,255,0,0.25)"/>

  <!-- Logo letterform: stylized M -->
  <g transform="translate(90, 55)">
    <!-- Construction circle (guide) -->
    <circle cx="50" cy="42" r="36" stroke="rgba(200,255,0,0.07)" stroke-width="0.75" stroke-dasharray="3 4" fill="none"/>
    <!-- Grid guides -->
    <line x1="50" y1="6" x2="50" y2="78" stroke="rgba(200,255,0,0.08)" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="14" y1="42" x2="86" y2="42" stroke="rgba(200,255,0,0.08)" stroke-width="0.5" stroke-dasharray="2 3"/>

    <!-- M letterform (geometric) -->
    <path d="M20,72 L20,20 L50,52 L80,20 L80,72" stroke="rgba(240,237,232,0.55)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Accent node dots at key points -->
    <circle cx="20" cy="20" r="3.5" fill="rgba(200,255,0,0.6)"/>
    <circle cx="80" cy="20" r="3.5" fill="rgba(200,255,0,0.4)"/>
    <circle cx="50" cy="52" r="4.5" fill="rgba(200,255,0,0.88)" stroke="#111111" stroke-width="1.5"/>
    <circle cx="20" cy="72" r="3" fill="rgba(240,237,232,0.25)"/>
    <circle cx="80" cy="72" r="3" fill="rgba(240,237,232,0.25)"/>

    <!-- Baseline -->
    <line x1="16" y1="76" x2="84" y2="76" stroke="rgba(200,255,0,0.2)" stroke-width="0.75"/>
  </g>

  <!-- Brand name -->
  <rect x="90" y="130" width="100" height="10" rx="2" fill="rgba(240,237,232,0.35)"/>
  <rect x="90" y="145" width="80" height="5" rx="2" fill="rgba(240,237,232,0.15)"/>

  <!-- ─── TOP RIGHT: Color Palette ─── -->
  <!-- Section label -->
  <rect x="292" y="26" width="68" height="5" rx="2" fill="rgba(240,237,232,0.18)"/>
  <rect x="292" y="35" width="48" height="3" rx="1" fill="rgba(200,255,0,0.25)"/>

  <!-- Primary swatch — large dark bg -->
  <rect x="292" y="48" width="96" height="96" rx="5" fill="#080808" stroke="rgba(240,237,232,0.1)" stroke-width="0.75"/>
  <rect x="304" y="122" width="40" height="4" rx="2" fill="rgba(240,237,232,0.2)"/>
  <rect x="304" y="130" width="30" height="3" rx="1" fill="rgba(240,237,232,0.1)"/>

  <!-- Accent swatches (2 col) -->
  <rect x="396" y="48" width="66" height="44" rx="5" fill="#C8FF00"/>
  <rect x="470" y="48" width="52" height="44" rx="5" fill="#FF6B35"/>
  <!-- Surface swatches -->
  <rect x="396" y="100" width="60" height="44" rx="5" fill="#1A1A1A" stroke="rgba(240,237,232,0.07)" stroke-width="0.75"/>
  <rect x="464" y="100" width="58" height="44" rx="5" fill="#111111" stroke="rgba(240,237,232,0.07)" stroke-width="0.75"/>

  <!-- Swatch labels -->
  <rect x="398" y="126" width="44" height="3" rx="1" fill="rgba(240,237,232,0.15)"/>
  <rect x="466" y="126" width="36" height="3" rx="1" fill="rgba(240,237,232,0.12)"/>
  <rect x="398" y="74" width="44" height="4" rx="2" fill="#080808"/>
  <rect x="472" y="74" width="35" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>

  <!-- ─── BOTTOM LEFT: Typography Specimen ─── -->
  <!-- Section label -->
  <rect x="30" y="165" width="74" height="5" rx="2" fill="rgba(240,237,232,0.18)"/>
  <rect x="30" y="174" width="52" height="3" rx="1" fill="rgba(200,255,0,0.25)"/>

  <!-- Display font specimen — large italic headline blocks -->
  <rect x="30" y="185" width="224" height="20" rx="3" fill="rgba(240,237,232,0.28)"/>
  <rect x="30" y="211" width="180" height="16" rx="3" fill="rgba(240,237,232,0.2)"/>
  <!-- Accent word in display -->
  <rect x="30" y="232" width="100" height="14" rx="3" fill="rgba(200,255,0,0.55)"/>
  <rect x="136" y="232" width="68" height="14" rx="3" fill="rgba(240,237,232,0.2)"/>

  <!-- Font name label + separator -->
  <line x1="30" y1="254" x2="254" y2="254" stroke="rgba(240,237,232,0.06)" stroke-width="0.75"/>
  <rect x="30" y="258" width="96" height="4" rx="2" fill="rgba(200,255,0,0.3)"/>

  <!-- UI font specimen — body text simulation -->
  <rect x="30" y="268" width="224" height="5" rx="2" fill="rgba(240,237,232,0.1)"/>
  <rect x="30" y="278" width="196" height="5" rx="2" fill="rgba(240,237,232,0.07)"/>
  <rect x="30" y="288" width="210" height="5" rx="2" fill="rgba(240,237,232,0.07)"/>

  <!-- Font name label -->
  <rect x="30" y="300" width="78" height="3" rx="1" fill="rgba(240,237,232,0.15)"/>

  <!-- ─── BOTTOM RIGHT: Business Cards ─── -->
  <!-- Section label -->
  <rect x="292" y="165" width="80" height="5" rx="2" fill="rgba(240,237,232,0.18)"/>
  <rect x="292" y="174" width="56" height="3" rx="1" fill="rgba(200,255,0,0.25)"/>

  <!-- Dark card -->
  <rect x="292" y="186" width="120" height="70" rx="5" fill="#080808" stroke="rgba(240,237,232,0.1)" stroke-width="0.75"/>
  <!-- Card accent top line -->
  <rect x="292" y="186" width="120" height="2" rx="1" fill="rgba(200,255,0,0.55)"/>
  <!-- Card M logo mark -->
  <path d="M306,202 L306,196 L313,203 L320,196 L320,202" stroke="rgba(240,237,232,0.4)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="313" cy="203" r="2" fill="rgba(200,255,0,0.7)"/>
  <!-- Card content -->
  <rect x="306" y="215" width="70" height="8" rx="2" fill="rgba(240,237,232,0.5)"/>
  <rect x="306" y="228" width="90" height="4" rx="2" fill="rgba(240,237,232,0.2)"/>
  <rect x="306" y="237" width="72" height="4" rx="2" fill="rgba(240,237,232,0.15)"/>
  <rect x="306" y="248" width="52" height="4" rx="2" fill="rgba(200,255,0,0.4)"/>

  <!-- Acid green card (tilt offset) -->
  <rect x="432" y="192" width="110" height="66" rx="5" fill="#C8FF00"/>
  <!-- Green card M logo mark -->
  <path d="M444,208 L444,202 L451,209 L458,202 L458,208" stroke="rgba(8,8,8,0.45)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="451" cy="209" r="2" fill="rgba(8,8,8,0.55)"/>
  <!-- Green card content -->
  <rect x="444" y="220" width="70" height="8" rx="2" fill="rgba(8,8,8,0.6)"/>
  <rect x="444" y="233" width="90" height="4" rx="2" fill="rgba(8,8,8,0.3)"/>
  <rect x="444" y="242" width="72" height="4" rx="2" fill="rgba(8,8,8,0.25)"/>
  <rect x="444" y="251" width="44" height="4" rx="2" fill="rgba(8,8,8,0.4)"/>
</svg>
